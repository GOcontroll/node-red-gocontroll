<script type="text/javascript">
    RED.nodes.registerType('CAN-Receive',{
        category: 'GOcontroll',
        color: '#f76d11',
        defaults: {
            name: {value:"CAN Receive"},
            caninterface: {value:"CAN 1"},
            canidtype: {value:"standard"},
            canid: {value:""},
            dlc: {value:"8"}
        },
        inputs:0,
        outputs:1,
        icon: "inject.png",
        label: function() {
            if(this.canid != "" && this.caninterface != null)
                return "Receive 0x"+this.canid+ " on " + this.caninterface;
            else
                return "Configure CAN Receive";
        },
        oneditprepare: function() {
            $.getJSON("controllertype", function(data) {
                if (data.includes("IV")) {
                    $(".Mini").hide();
                    $(".Display").hide();
                    $(".IV").show();
                } else if (data.includes("Mini")) {
                    $(".IV").hide();
                    $(".Display").hide();
                    $(".Mini").show();
                } else if (data.includes("Display")) {
                    $(".IV").hide();
                    $(".Mini").hide();
                    $(".Display").show();
                } else {
                    console.log("error getting controllertype");
                    $(".IV").hide();
                    $(".Mini").hide();
                    $(".Display").hide();
                }
            });
        }
    });
</script>


<script type="text/x-red" data-template-name="CAN-Receive">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>

    <div class="form-row">
        <label for="node-input-caninterface"><i class="fa fa-plug"></i> Interface</label>
        <select id="node-input-caninterface" style="width:204px">
            <option value="CAN 1">CAN 1</option>
            <option value="CAN 2">CAN 2</option>
            <option class="IV" value="CAN 3">CAN 3</option>
            <option class="IV" value="CAN 4">CAN 4</option>
        </select>
    </div>

    <div class="form-row">
        <label for="node-input-canidtype"><i class="fa fa-id-card"></i> ID Type</label>
        <select id="node-input-canidtype" style="width:204px">
            <option value="standard">Standard Identifier (11 bits)</option>
            <option value="extended">Extended identifier (29 bits)</option>
        </select>
    </div>

    <div class="form-row">
        <label for="node-input-canid"><i class="fa fa-code"></i> CAN ID (0x)</label>
        <input type="text" id="node-input-canid" placeholder="Can ID" style="width:204px">
    </div>

    <div class="form-row">
        <label for="node-input-dlc"><i class="fa fa-list-ol"></i> DLC</label>
        <input type="text" id="node-input-dlc" placeholder="8" style="width:50px"> <span style="color:#888">bytes (0..8)</span>
    </div>
</script>


<script type="text/x-red" data-help-name="CAN-Receive">
    <p>The CAN Receive node listens on one of the onboard CAN buses and outputs incoming frames whose identifier matches the configured CAN ID. The data bytes are emitted on <code>msg.payload</code> as an array of bytes (uint8).</p>

    <h2>Configuration</h2>
    <p><strong><em>Interface:</em></strong> the CAN bus to listen on. Available buses depend on the controller (see pinouts below).</p>
    <p><strong><em>ID type:</em></strong> standard (11-bit) or extended (29-bit) identifier.</p>
    <p><strong><em>CAN ID (0x):</em></strong> the message identifier in hexadecimal (e.g. <code>100</code>, <code>7FF</code>, <code>18FEF100</code>). Only frames matching both the ID and the ID type are forwarded.</p>
    <p><strong><em>DLC:</em></strong> expected data length code (0..8). If a frame with a different length arrives, a warning is emitted but the frame is still forwarded.</p>

    <h2>Output format</h2>
    <p>For every matching frame the node emits a message with the following fields:</p>
    <ul>
        <li><code>msg.payload</code> &mdash; array of received bytes, e.g. <code>[0x01, 0x02, 0x03, 0x04, 0x05, 0x06, 0x07, 0x08]</code></li>
        <li><code>msg.canid</code> &mdash; numeric CAN identifier of the received frame</li>
        <li><code>msg.dlc</code>   &mdash; actual data length of the received frame</li>
        <li><code>msg.rtr</code>   &mdash; remote transmission request flag</li>
        <li><code>msg.ext</code>   &mdash; <code>true</code> if the frame uses an extended identifier</li>
    </ul>

    <h2>Controller pinouts</h2>

    <h3>Moduline L4</h3>
    <p>The four CAN buses are connected to the C connector (middle).</p>
    <p>CAN1 - Connector C pin 14 (L) and pin 15 (H)</p>
    <p>CAN2 - Connector C pin 20 (L) and pin 21 (H)</p>
    <p>CAN3 - Connector C pin 19 (L) and pin 18 (H)</p>
    <p>CAN4 - Connector C pin 13 (L) and pin 12 (H)</p>

    <h3>Moduline M1</h3>
    <p>The two CAN buses are connected to both connector A and B.</p>
    <p>CAN1 - Connector B pin 24 (L) and pin 25 (H)</p>
    <p>CAN2 - Connector A pin 24 (L) and pin 25 (H)</p>

    <h3>Moduline HMI1</h3>
    <p>The two CAN buses are connected to the main connector.</p>
    <p>CAN1 - Main Connector pin 16 (L) and pin 17 (H)</p>
    <p>CAN2 - Main Connector pin 24 (L) and pin 25 (H)</p>
</script>
