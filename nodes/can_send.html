<script type="text/javascript">
    RED.nodes.registerType('CAN-Send',{
        category: 'GOcontroll',
        color: '#f76d11',
        defaults: {
            name: {value:"CAN Send"},
            caninterface: {value:"CAN 1"},
            canidtype: {value:"standard"},
            canid: {value:""},
            send: {value: 0},
            caninterval: {value: "1000"},
            dlc: {value: "8"}
        },
        inputs:1,
        outputs:0,
        icon: "inject.png",
        label: function() {
            if(this.canid != "" && this.caninterface != null)
                return "Send 0x"+this.canid + " on " + this.caninterface;
            else
              return "Configure CAN Send";
        },
        oneditprepare: function() {
            $(this.send).trigger("change");

            $("#node-input-send").on("change", function() {
                var send = $("#node-input-send").val();
                if(send == 0){$("#can-interval").hide();}else{$("#can-interval").show();}
            });

            $.getJSON("controllertype", function(data) {
                if (data.includes("IV")) {
                    $(".IV").show();
                    $(".Mini").hide();
                    $(".Display").hide();
                } else if (data.includes("Mini")) {
                    $(".IV").hide();
                    $(".Mini").show();
                    $(".Display").hide();
                } else if (data.includes("Display")) {
                    $(".IV").hide();
                    $(".Mini").hide();
                    $(".Display").show();
                } else {
                    console.log("error getting controllertype");
                    $(".IV").hide();
                    $(".Mini").hide();
                    $(".Display").hide();
                }
            });
        }
    });
</script>


<script type="text/x-red" data-template-name="CAN-Send">
    <div class="form-row">
        <label for="node-input-name"><i class="icon-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name" style="width:204px">
    </div>

    <div class="form-row">
        <label for="node-input-caninterface"><i class="fa fa-plug"></i> Interface</label>
        <select id="node-input-caninterface" style="width:204px">
            <option value="CAN 1">CAN 1</option>
            <option value="CAN 2">CAN 2</option>
            <option class="IV" value="CAN 3">CAN 3</option>
            <option class="IV" value="CAN 4">CAN 4</option>
        </select>
    </div>

    <div class="form-row">
        <label for="node-input-canidtype"><i class="fa fa-id-card"></i> ID Type</label>
        <select id="node-input-canidtype" style="width:204px">
            <option value="standard">Standard Identifier (11 bits)</option>
            <option value="extended">Extended identifier (29 bits)</option>

    <div class="form-row">

    <div class="form-row">

    <div class="form-row">
        <label for="node-input-dlc"><i class="fa fa-list-ol"></i> DLC</label>
        <input type="text" id="node-input-dlc" placeholder="8" style="width:50px"> <span style="color:#888">bytes (0..8)</span>
    </div>
</script>


<script type="text/x-red" data-help-name="CAN-Send">
    <p>The CAN Send node transmits a CAN frame on one of the onboard CAN buses. The data bytes are taken from <code>msg.payload</code>, which must be an array of bytes (0..255).</p>

    <h2>Configuration</h2>
    <p><strong><em>Interface:</em></strong> the CAN bus to send on. Available buses depend on the controller (see pinouts below).</p>
    <p><strong><em>ID type:</em></strong> standard (11-bit) or extended (29-bit) identifier.</p>
    <p><strong><em>CAN ID (0x):</em></strong> the message identifier in hexadecimal (e.g. <code>100</code>, <code>7FF</code>, <code>18FEF100</code>).</p>
    <p><strong><em>Send trigger:</em></strong></p>
    <ul>
        <li><em>On input message</em> &mdash; every incoming message triggers a CAN frame, regardless of whether the data changed.</li>
        <li><em>Interval (cyclic)</em> &mdash; the frame is sent cyclically at the configured interval. Incoming messages update the data buffer for the next interval send, but do not themselves trigger a send.</li>
    </ul>
    <p><strong><em>Interval (ms):</em></strong> the period of cyclic sending. Only used when send trigger is <em>Interval</em>.</p>
    <p><strong><em>DLC:</em></strong> data length code (0..8) &mdash; the number of data bytes in the frame.</p>

    <h2>Data format</h2>
    <p><code>msg.payload</code> must be an array of numbers in the range 0..255, e.g.:</p>
    <pre>msg.payload = [0x01, 0x02, 0x03, 0x04, 0x05, 0x06, 0x07, 0x08];</pre>
    <p>If the array is shorter than DLC, the remaining bytes are sent as <code>0x00</code>. If longer, the extra bytes are ignored. Out-of-range or non-numeric values are clamped to 0..255.</p>

    <h2>Controller pinouts</h2>

    <h3>Moduline L4</h3>
    <p>The four CAN buses are connected to the C connector (middle).</p>
    <p>CAN1 - Connector C pin 14 (L) and pin 15 (H)</p>
    <p>CAN2 - Connector C pin 20 (L) and pin 21 (H)</p>
    <p>CAN3 - Connector C pin 19 (L) and pin 18 (H)</p>
    <p>CAN4 - Connector C pin 13 (L) and pin 12 (H)</p>

    <h3>Moduline M1</h3>
    <p>The two CAN buses are connected to both connector A and B.</p>
    <p>CAN1 - Connector B pin 24 (L) and pin 25 (H)</p>
    <p>CAN2 - Connector A pin 24 (L) and pin 25 (H)</p>

    <h3>Moduline HMI1</h3>
    <p>The two CAN buses are connected to the main connector.</p>
    <p>CAN1 - Main Connector pin 16 (L) and pin 17 (H)</p>
    <p>CAN2 - Main Connector pin 24 (L) and pin 25 (H)</p>
</script>
